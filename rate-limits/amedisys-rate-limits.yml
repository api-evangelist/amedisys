specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Amedisys
providerId: amedisys
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Home Health
  - Hospice
  - Healthcare
  - Rate Limiting
description: >-
  Amedisys does not publish public API rate limits. Any partner integrations operate under per-contract throughput agreements with payer and EHR systems. Reconcile when Amedisys publishes public rate limit documentation.
notes: >-
  Amedisys is a home health and hospice provider; it does not publish a public API developer portal or commercial API offering. Any data exchanges with payers, EHR systems, or referral partners are governed by HIPAA-compliant integration agreements rather than a public price list. Reconcile if Amedisys publishes a public API.
sources:
  - https://www.amedisys.com
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Undocumented - bilateral agreement
    scope: contract
    metric: varies
    limit: 'see partner agreement; not publicly documented'
policies:
  - name: Documentation Status
    description: >-
      Amedisys does not publish public per-second or per-minute API rate
      limits. Throughput, concurrency, and burst behavior are governed by the
      relevant partner, supplier, or merchant agreement.
  - name: Backoff Strategy
    description: >-
      Where any HTTP API is exposed, clients should implement exponential
      backoff with jitter and honor any Retry-After header returned on 429
      or 503 responses.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
